name: EnigMano Instance Deployment

on:
  workflow_dispatch:
    inputs:
      instance_number:
        description: 'Instance Number (1-10)'
        required: true
        default: '1'
        type: string

jobs:
  deploy-rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: System Information
      run: |
        Write-Host "=== ENIGMANO RDP DEPLOYMENT ===" -ForegroundColor Green
        Write-Host "Instance Number: ${{ github.event.inputs.instance_number }}" -ForegroundColor Yellow
        Write-Host "Runner: $env:RUNNER_NAME" -ForegroundColor Yellow
        Write-Host "Workflow: $env:GITHUB_WORKFLOW" -ForegroundColor Yellow
        
        Write-Host "`n=== SYSTEM SPECIFICATIONS ===" -ForegroundColor Cyan
        Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, TotalPhysicalMemory
        Get-WmiObject -Class Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors
        
    - name: Enable RDP
      run: |
        Write-Host "Enabling Remote Desktop..." -ForegroundColor Green
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        
    - name: Create User Account
      run: |
        Write-Host "Setting up user account..." -ForegroundColor Green
        $Password = ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin"
        Write-Host "Username: runneradmin" -ForegroundColor Yellow
        Write-Host "Password: P@ssw0rd!" -ForegroundColor Yellow
        
    - name: Download and Setup ngrok (Latest Version)
      run: |
        Write-Host "Downloading latest ngrok version..." -ForegroundColor Green
        
        # Remove any existing ngrok
        if (Test-Path "C:\ngrok") { Remove-Item -Recurse -Force "C:\ngrok" }
        
        # Download the latest version from official source
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive ngrok.zip -DestinationPath C:\ngrok
        
        # Verify ngrok exists
        if (Test-Path "C:\ngrok\ngrok.exe") {
          Write-Host "ngrok downloaded successfully!" -ForegroundColor Green
        } else {
          Write-Host "ngrok download failed!" -ForegroundColor Red
          exit 1
        }
        
    - name: Configure ngrok
      run: |
        Write-Host "Configuring ngrok with your authtoken..." -ForegroundColor Green
        C:\ngrok\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # Verify authentication
        C:\ngrok\ngrok.exe --version
        
    - name: Install Essential Software
      run: |
        Write-Host "Installing essential software..." -ForegroundColor Green
        
        # Install Chocolatey
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        
        # Install browsers and utilities
        choco install googlechrome firefox 7zip notepadplusplus vlc -y
        
        Write-Host "Software installation completed!" -ForegroundColor Green
        
    - name: Install and Setup Cloudflare WARP
      run: |
        Write-Host "Setting up Cloudflare WARP for secure connection..." -ForegroundColor Green
        try {
          Invoke-WebRequest -Uri "https://1111-releases.cloudflareclient.com/windows/Cloudflare_WARP_Release-x64.msi" -OutFile "CloudflareWARP.msi"
          Start-Process msiexec.exe -Wait -ArgumentList '/I CloudflareWARP.msi /quiet /norestart'
          Write-Host "Cloudflare WARP installed successfully!" -ForegroundColor Green
        } catch {
          Write-Host "Cloudflare WARP installation skipped (optional)" -ForegroundColor Yellow
        }
        
    - name: Start ngrok Tunnel
      run: |
        Write-Host "Starting ngrok tunnel..." -ForegroundColor Green
        
        # Start ngrok in background
        $ngrokProcess = Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "tcp 3389" -PassThru -WindowStyle Hidden
        
        # Wait for tunnel to establish
        Start-Sleep -Seconds 15
        
        # Check if tunnel is running
        $tunnelCheck = try { Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop } catch { $null }
        if ($tunnelCheck -and $tunnelCheck.tunnels.Count -gt 0) {
          Write-Host "ngrok tunnel established successfully!" -ForegroundColor Green
        } else {
          Write-Host "Warning: ngrok tunnel may not be ready yet" -ForegroundColor Yellow
        }
        
    - name: Display Connection Details
      run: |
        Write-Host "`n=== CONNECTION DETAILS ===" -ForegroundColor Green
        
        # Give ngrok a moment to fully initialize
        Start-Sleep -Seconds 5
        
        try {
          $ngrokApi = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
          $publicUrl = $ngrokApi.tunnels[0].public_url
          $host = $publicUrl -replace "tcp://", ""
          
          Write-Host "╔════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         🔥 ENIGMANO RDP ACCESS 🔥          ║" -ForegroundColor Cyan  
          Write-Host "╠════════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║ Host: $host" -ForegroundColor White
          Write-Host "║ Username: runneradmin                      ║" -ForegroundColor White
          Write-Host "║ Password: P@ssw0rd!                        ║" -ForegroundColor White
          Write-Host "╚════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "`n📋 Connection Instructions:" -ForegroundColor Yellow
          Write-Host "1️⃣ Open Remote Desktop Connection (mstsc)" -ForegroundColor White
          Write-Host "2️⃣ Enter the host address above" -ForegroundColor White
          Write-Host "3️⃣ Use the provided credentials" -ForegroundColor White
          Write-Host "4️⃣ ⚠️ Keep this window open to maintain connection!" -ForegroundColor Red
          
        } catch {
          Write-Host "Could not retrieve connection details automatically." -ForegroundColor Red
          Write-Host "Please check ngrok status manually at http://localhost:4040" -ForegroundColor Yellow
        }
        
    - name: Keep Session Alive
      run: |
        Write-Host "`n=== SESSION ACTIVE ===" -ForegroundColor Green
        Write-Host "✅ EnigMano RDP instance is now running!" -ForegroundColor Cyan
        Write-Host "⏰ Instance will remain active for up to 6 hours." -ForegroundColor Yellow
        Write-Host "🚫 Do not close this window to maintain the connection." -ForegroundColor Red
        
        $counter = 0
        while ($true) {
          $counter++
          Write-Host "💓 Heartbeat #$counter ($(Get-Date))" -ForegroundColor Green
          
          # Check ngrok status
          try {
            $status = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -TimeoutSec 5 -ErrorAction Stop
            if ($status.tunnels.Count -gt 0) {
              Write-Host "✅ ngrok tunnel: ACTIVE" -ForegroundColor Green
            } else {
              Write-Host "⚠️ ngrok tunnel: NO TUNNELS" -ForegroundColor Yellow
            }
          } catch {
            Write-Host "❌ ngrok error - attempting restart..." -ForegroundColor Red
            Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "tcp 3389" -WindowStyle Hidden
          }
          
          Start-Sleep -Seconds 60
        }
